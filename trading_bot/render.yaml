services:
  - type: worker
    name: trading-signal-bot
    runtime: python
    plan: free
    buildCommand: pip install -r trading_bot/requirements.txt
    startCommand: bash trading_bot/start.sh
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/logs
      sizeGB: 1
