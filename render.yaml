services:
  - type: worker
    name: trading-signal-bot
    runtime: python
    plan: free
    buildCommand: pip install --prefer-binary -r trading_bot/requirements.txt
    startCommand: cd trading_bot && bash start.sh
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/logs
      sizeGB: 1
